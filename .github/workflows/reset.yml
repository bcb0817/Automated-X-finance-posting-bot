name: Daily Schedule Reset

on:
  schedule:
    - cron: '0 15 * * *'   # UTC 15:00 = JST 00:00
  workflow_dispatch:

permissions:
  contents: write

jobs:
  reset:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Regenerate post.yml schedule
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          cd src
          python scheduler/generate_schedule.py
