name: Market Narrative

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'image=画像のみ / post=実投稿'
        required: false
        default: 'image'

jobs:
  narrative:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Install Japanese fonts
        run: sudo apt-get update && sudo apt-get install -y fonts-noto-cjk
      - name: Run narrative bot
        env:
          API_KEY: ${{ secrets.API_KEY }}
          API_KEY_SECRET: ${{ secrets.API_KEY_SECRET }}
          ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN }}
          ACCESS_TOKEN_SECRET: ${{ secrets.ACCESS_TOKEN_SECRET }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
        run: |
          cd src
          if [ "${{ github.event.inputs.action }}" = "post" ]; then
            python narrative_bot/narrative_post.py post
          else
            python narrative_bot/narrative_post.py
          fi
