name: X Finance Auto Post Bot

on:
  schedule:
    - cron: '34 19 * * *'  # JST 04:34
    - cron: '54 19 * * *'  # JST 04:54
    - cron: '56 20 * * *'  # JST 05:56
    - cron: '13 21 * * *'  # JST 06:13
    - cron: '37 21 * * *'  # JST 06:37
    - cron: '55 21 * * *'  # JST 06:55
    - cron: '18 22 * * *'  # JST 07:18
    - cron: '36 22 * * *'  # JST 07:36
    - cron: '50 22 * * *'  # JST 07:50
    - cron: '14 23 * * *'  # JST 08:14
    - cron: '36 23 * * *'  # JST 08:36
    - cron: '49 23 * * *'  # JST 08:49
    - cron: '6 2 * * *'  # JST 11:06
    - cron: '19 2 * * *'  # JST 11:19
    - cron: '34 2 * * *'  # JST 11:34
    - cron: '47 2 * * *'  # JST 11:47
    - cron: '12 3 * * *'  # JST 12:12
    - cron: '46 3 * * *'  # JST 12:46
    - cron: '7 8 * * *'  # JST 17:07
    - cron: '19 8 * * *'  # JST 17:19
    - cron: '45 8 * * *'  # JST 17:45
    - cron: '12 9 * * *'  # JST 18:12
    - cron: '30 9 * * *'  # JST 18:30
    - cron: '57 9 * * *'  # JST 18:57
    - cron: '10 10 * * *'  # JST 19:10
    - cron: '39 10 * * *'  # JST 19:39
    - cron: '55 10 * * *'  # JST 19:55
    - cron: '8 11 * * *'  # JST 20:08
    - cron: '44 11 * * *'  # JST 20:44
    - cron: '56 11 * * *'  # JST 20:56
    - cron: '17 12 * * *'  # JST 21:17
    - cron: '33 12 * * *'  # JST 21:33
    - cron: '57 12 * * *'  # JST 21:57
    - cron: '9 13 * * *'  # JST 22:09
    - cron: '22 13 * * *'  # JST 22:22
    - cron: '40 13 * * *'  # JST 22:40
    - cron: '52 13 * * *'  # JST 22:52
  workflow_dispatch:
    inputs:
      mode:
        description: '投稿モード（link / normal / diagram / test）'
        required: false
        default: 'test'

concurrency:
  group: x-finance-auto-post-bot
  cancel-in-progress: false

jobs:
  post:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Determine post mode
        id: mode
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "mode=${{ github.event.inputs.mode }}" >> $GITHUB_OUTPUT
          else
            HOUR=$(TZ=Asia/Tokyo date +%H)
            if [ "$HOUR" = "04" ] || [ "$HOUR" = "06" ] || [ "$HOUR" = "11" ] || [ "$HOUR" = "17" ]; then
              echo "mode=link" >> $GITHUB_OUTPUT
            else
              RAND=$((RANDOM % 2))
              if [ "$RAND" = "0" ]; then
                echo "mode=normal" >> $GITHUB_OUTPUT
              else
                echo "mode=diagram" >> $GITHUB_OUTPUT
              fi
            fi
          fi

      - name: Post to X
        env:
          API_KEY: ${{ secrets.API_KEY }}
          API_KEY_SECRET: ${{ secrets.API_KEY_SECRET }}
          ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN }}
          ACCESS_TOKEN_SECRET: ${{ secrets.ACCESS_TOKEN_SECRET }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          cd src
          python post.py ${{ steps.mode.outputs.mode }}
