name: X Finance Auto Post Bot

on:
  schedule:
    - cron: '42 19 * * *'
    - cron: '54 19 * * *'
    - cron: '12 20 * * *'
    - cron: '0 21 * * *'
    - cron: '15 21 * * *'
    - cron: '53 21 * * *'
    - cron: '59 21 * * *'
    - cron: '11 22 * * *'
    - cron: '19 22 * * *'
    - cron: '38 22 * * *'
    - cron: '1 23 * * *'
    - cron: '29 23 * * *'
    - cron: '35 23 * * *'
    - cron: '57 23 * * *'
    - cron: '52 2 * * *'
    - cron: '0 3 * * *'
    - cron: '13 3 * * *'
    - cron: '31 3 * * *'
    - cron: '44 3 * * *'
    - cron: '49 3 * * *'
    - cron: '54 3 * * *'
    - cron: '59 3 * * *'
    - cron: '10 8 * * *'
    - cron: '46 8 * * *'
    - cron: '51 8 * * *'
    - cron: '57 8 * * *'
    - cron: '11 9 * * *'
    - cron: '24 9 * * *'
    - cron: '29 9 * * *'
    - cron: '40 9 * * *'
    - cron: '56 9 * * *'
    - cron: '7 10 * * *'
    - cron: '18 10 * * *'
    - cron: '33 10 * * *'
    - cron: '38 10 * * *'
    - cron: '56 10 * * *'
    - cron: '9 11 * * *'
    - cron: '15 11 * * *'
    - cron: '25 11 * * *'
    - cron: '34 11 * * *'
    - cron: '7 12 * * *'
    - cron: '33 12 * * *'
    - cron: '40 12 * * *'
    - cron: '45 12 * * *'
    - cron: '39 13 * * *'
  workflow_dispatch:
    inputs:
      mode:
        description: '投稿モード（link / normal / diagram / test）'
        required: false
        default: 'test'

jobs:
  post:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Determine post mode
        id: mode
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "mode=${{ github.event.inputs.mode }}" >> $GITHUB_OUTPUT
          else
            HOUR=$(date -u +%H)
            if [ "$HOUR" = "19" ] || [ "$HOUR" = "21" ] || [ "$HOUR" = "02" ] || [ "$HOUR" = "08" ]; then
              echo "mode=link" >> $GITHUB_OUTPUT
            else
              RAND=$((RANDOM % 2))
              if [ "$RAND" = "0" ]; then
                echo "mode=normal" >> $GITHUB_OUTPUT
              else
                echo "mode=diagram" >> $GITHUB_OUTPUT
              fi
            fi
          fi

      - name: Post to X
        env:
          API_KEY: ${{ secrets.API_KEY }}
          API_KEY_SECRET: ${{ secrets.API_KEY_SECRET }}
          ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN }}
          ACCESS_TOKEN_SECRET: ${{ secrets.ACCESS_TOKEN_SECRET }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          cd src
          python post.py ${{ steps.mode.outputs.mode }}
