name: X Finance Auto Post Bot

on:
  schedule:
    - cron: '48 19 * * *'
    - cron: '27 20 * * *'
    - cron: '52 20 * * *'
    - cron: '5 21 * * *'
    - cron: '31 21 * * *'
    - cron: '36 21 * * *'
    - cron: '14 22 * * *'
    - cron: '48 22 * * *'
    - cron: '10 23 * * *'
    - cron: '12 23 * * *'
    - cron: '29 23 * * *'
    - cron: '32 23 * * *'
    - cron: '39 23 * * *'
    - cron: '13 2 * * *'
    - cron: '16 2 * * *'
    - cron: '26 2 * * *'
    - cron: '36 2 * * *'
    - cron: '0 3 * * *'
    - cron: '20 3 * * *'
    - cron: '48 3 * * *'
    - cron: '44 8 * * *'
    - cron: '47 8 * * *'
    - cron: '39 9 * * *'
    - cron: '54 9 * * *'
    - cron: '19 10 * * *'
    - cron: '24 10 * * *'
    - cron: '26 10 * * *'
    - cron: '29 10 * * *'
    - cron: '10 11 * * *'
    - cron: '31 11 * * *'
    - cron: '41 11 * * *'
    - cron: '1 12 * * *'
    - cron: '34 12 * * *'
    - cron: '37 12 * * *'
    - cron: '47 12 * * *'
    - cron: '53 12 * * *'
    - cron: '2 13 * * *'
    - cron: '15 13 * * *'
    - cron: '21 13 * * *'
    - cron: '34 13 * * *'
    - cron: '49 13 * * *'
  workflow_dispatch:
    inputs:
      mode:
        description: '投稿モード（link / normal / test）'
        required: false
        default: 'test'

jobs:
  post:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Determine post mode
        id: mode
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "mode=${{ github.event.inputs.mode }}" >> $GITHUB_OUTPUT
          else
            HOUR=$(date -u +%H)
            if [ "$HOUR" = "19" ] || [ "$HOUR" = "21" ] || [ "$HOUR" = "02" ] || [ "$HOUR" = "08" ]; then
              echo "mode=link" >> $GITHUB_OUTPUT
            else
              echo "mode=normal" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Post to X
        env:
          API_KEY: ${{ secrets.API_KEY }}
          API_KEY_SECRET: ${{ secrets.API_KEY_SECRET }}
          ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN }}
          ACCESS_TOKEN_SECRET: ${{ secrets.ACCESS_TOKEN_SECRET }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          cd src
          python post.py ${{ steps.mode.outputs.mode }}
