name: X Finance Auto Post Bot

# schedule の cron は GitHub Actions 仕様により UTC。
# コメントの JST は実際の日本時間での実行目安。
# このファイルは毎日 0:00 JST に reset.yml が自動更新します。

on:
  schedule:
    - cron: '30 19 * * *'  # JST 04:30
    - cron: '12 20 * * *'  # JST 05:12
    - cron: '48 20 * * *'  # JST 05:48
    - cron: '12 21 * * *'  # JST 06:12
    - cron: '27 21 * * *'  # JST 06:27
    - cron: '52 21 * * *'  # JST 06:52
    - cron: '15 22 * * *'  # JST 07:15
    - cron: '29 22 * * *'  # JST 07:29
    - cron: '48 22 * * *'  # JST 07:48
    - cron: '13 23 * * *'  # JST 08:13
    - cron: '28 23 * * *'  # JST 08:28
    - cron: '44 23 * * *'  # JST 08:44
    - cron: '56 23 * * *'  # JST 08:56
    - cron: '7 2 * * *'  # JST 11:07
    - cron: '19 2 * * *'  # JST 11:19
    - cron: '32 2 * * *'  # JST 11:32
    - cron: '50 2 * * *'  # JST 11:50
    - cron: '7 3 * * *'  # JST 12:07
    - cron: '20 3 * * *'  # JST 12:20
    - cron: '48 3 * * *'  # JST 12:48
    - cron: '15 8 * * *'  # JST 17:15
    - cron: '38 8 * * *'  # JST 17:38
    - cron: '51 8 * * *'  # JST 17:51
    - cron: '10 9 * * *'  # JST 18:10
    - cron: '24 9 * * *'  # JST 18:24
    - cron: '39 9 * * *'  # JST 18:39
    - cron: '55 9 * * *'  # JST 18:55
    - cron: '12 10 * * *'  # JST 19:12
    - cron: '39 10 * * *'  # JST 19:39
    - cron: '6 11 * * *'  # JST 20:06
    - cron: '21 11 * * *'  # JST 20:21
    - cron: '39 11 * * *'  # JST 20:39
    - cron: '53 11 * * *'  # JST 20:53
    - cron: '11 12 * * *'  # JST 21:11
    - cron: '27 12 * * *'  # JST 21:27
    - cron: '49 12 * * *'  # JST 21:49
    - cron: '12 13 * * *'  # JST 22:12
    - cron: '32 13 * * *'  # JST 22:32
    - cron: '44 13 * * *'  # JST 22:44
  workflow_dispatch:
    inputs:
      mode:
        description: '投稿モード（link / normal / diagram / test）'
        required: false
        default: 'test'

concurrency:
  group: x-finance-auto-post-bot
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  post:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Determine post mode
        id: mode
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "mode=${{ github.event.inputs.mode }}" >> $GITHUB_OUTPUT
          else
            RAND=$((RANDOM % 2))
            if [ "$RAND" = "0" ]; then
              echo "mode=link" >> $GITHUB_OUTPUT
            else
              echo "mode=diagram" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Post to X
        id: post
        env:
          API_KEY: ${{ secrets.API_KEY }}
          API_KEY_SECRET: ${{ secrets.API_KEY_SECRET }}
          ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN }}
          ACCESS_TOKEN_SECRET: ${{ secrets.ACCESS_TOKEN_SECRET }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python src/post.py ${{ steps.mode.outputs.mode }}

      - name: Commit posted history
        if: success() && steps.mode.outputs.mode != 'test'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/posted_history.json
          git diff --staged --quiet || git commit -m "Update posted history"
          git push
